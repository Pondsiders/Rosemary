# Docker image publish: fires on every git tag matching v*. Builds the
# image from the repo-root Dockerfile and pushes to GHCR.
#
# Image name defaults to the repo name: ghcr.io/pondsiders/alpha for this
# repo, ghcr.io/pondsiders/rosemary after fork. One less thing to change.
#
# Tags published per release: the exact version (0.2.0), the minor track
# (0.2), and "latest". Compose files can pin to whichever level of stability
# they want.

name: Docker Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:                # manual trigger for recovery / re-publish

permissions:
  contents: read
  packages: write                   # required for pushing to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR lowercases the path automatically; metadata-action also
          # handles it. ghcr.io/${{ github.repository }} resolves to
          # ghcr.io/pondsiders/alpha for this repo.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}            # 0.2.0
            type=semver,pattern={{major}}.{{minor}}    # 0.2
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
