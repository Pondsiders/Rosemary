# Reusable release building block: python-semantic-release bumps the version,
# regenerates CHANGELOG.md, commits, tags, and creates a GitHub Release.
#
# No triggers of its own — called by ship.yml (workflow_dispatch) as the second
# stage of the release chain (test -> release -> publish). It exposes the
# released version so the publish stage knows what to build:
#   outputs.released  "true" when a release was actually cut
#   outputs.version   the new version (no leading v), e.g. 1.2.0
#   outputs.tag       the new git tag, e.g. v1.2.0
#
# Mr. Frogbot's installation token is used (not the default GITHUB_TOKEN) so PSR
# can push the release commit + tag through main's branch protection (Mr.
# Frogbot is in the bypass list).
#
# Secret names are still `FIXOTRON_*` for historical reasons (the App was
# originally named Fixotron, renamed 2026-05-27). The values are the App ID and
# private key, which survived the rename — so the secrets still work.

name: release

on:
  workflow_call:
    outputs:
      released:
        description: '"true" when a new release was created'
        value: ${{ jobs.release.outputs.released }}
      version:
        description: "The newly released version (no leading v), e.g. 1.2.0"
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: "The new git tag, e.g. v1.2.0"
        value: ${{ jobs.release.outputs.tag }}

permissions:
  contents: write                   # PSR needs to push commits and tags

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.psr.outputs.released }}
      version: ${{ steps.psr.outputs.version }}
      tag: ${{ steps.psr.outputs.tag }}

    steps:
      - name: Mint Mr. Frogbot installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FIXOTRON_APP_ID }}
          private-key: ${{ secrets.FIXOTRON_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0            # PSR needs full history for commit analysis
          ref: ${{ github.ref_name }}

      - name: Run python-semantic-release
        id: psr
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          directory: mechanism      # pyproject.toml lives under mechanism/
          git_committer_name: Mr. Frogbot
          git_committer_email: 288168714+mrfrogbot[bot]@users.noreply.github.com
