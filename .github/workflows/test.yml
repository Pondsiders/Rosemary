# Reusable test building block: pytest + ruff + basedpyright.
#
# No triggers of its own — it's called by the orchestrators:
#   - ci.yml   (pull_request + push to main): the merge / main gate
#   - ship.yml (workflow_dispatch): the first stage of the release chain
# The same job runs regardless of caller, so the gate is identical everywhere.

name: test

on:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest

    env:
      # Bogus LLM config — clients construct (Pydantic validates the URL
      # syntax) but no network call is ever made: MECHANISM_CI=1 triggers
      # the conftest blanket-mock of .create() on both clients.
      CHAT_API_KEY: fake-chat-key
      CHAT_BASE_URL: http://invalid.local
      CHAT_MODEL: fake-chat-model
      EMBEDDING_API_KEY: fake-embed-key
      EMBEDDING_BASE_URL: http://invalid.local
      EMBEDDING_MODEL: fake-embed-model
      # LOGFIRE_TOKEN deliberately unset — settings.py validator refuses a
      # token without OTEL_SERVICE_NAME, and CI has no use for either.
      TIMEZONE: America/Los_Angeles
      # MECHANISM_TOKEN is required by Settings; tests don't exercise auth,
      # so any value works — it just has to be set so Settings instantiates.
      MECHANISM_TOKEN: ci-token-not-a-real-secret
      LOGFIRE_IGNORE_NO_CONFIG: "1"
      MECHANISM_CI: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: mechanism
        run: uv sync

      - name: Run pytest
        working-directory: mechanism
        run: uv run pytest -v

      - name: Lint
        working-directory: mechanism
        run: uv run ruff check

      - name: Type check
        working-directory: mechanism
        run: uv run basedpyright
