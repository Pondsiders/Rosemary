# Seed cases for the /hooks/memories extract-queries eval.
#
# Each case is identified by its row id in the source database. The
# expected_topics list is the hand-curated "ground truth" — topics the
# extract-queries step should surface from this prompt. The stratum tags let
# us report per-bucket scores:
#
#   S  single-substantive-topic (baseline — is recall working at all?)
#   M  multi-substantive (the Test 5 failure-mode stratum from #13)
#   P  primary-topic-plus-peripheral-references (the should-filter stratum)
#
# This file is committed; the materialized dataset (with full prompt content)
# lives in data/dataset.yaml and is gitignored. Run extract_dataset.py to
# (re)generate.

