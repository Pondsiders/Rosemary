services:
  tailscale:
    image: ghcr.io/tailscale/tailscale:latest
    container_name: alpha-server-tailscale
    hostname: alpha-server
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}          # used only on first boot
      TS_HOSTNAME: alpha-server
      TS_STATE_DIR: /var/lib/tailscale
      TS_AUTH_ONCE: "true"
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
      TS_SERVE_CONFIG: /config/serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  tailscale-state:
