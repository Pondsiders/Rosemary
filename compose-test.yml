name: alpha-test

# Isolated Postgres + Redis stack for the pytest suite.
# Tests run on the host (uvicorn never enters this picture); these services
# exist solely so `uv run pytest` has a database and a Redis to talk to that
# are not, and cannot accidentally be, production.
#
# Ports are deliberately offset from compose-dev.yml's so the dev and test
# stacks can run side-by-side on Workshop without colliding.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:56379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
